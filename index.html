<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BidPilot - Autonomous Proposal Operations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class', // Enable manual dark mode toggling
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              zinc: {
                950: '#09090b',
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #fafafa; /* zinc-50 */
        color: #09090b; /* zinc-950 */
        /* Subtle Dot Pattern for Light Mode */
        background-image: radial-gradient(#e4e4e7 1px, transparent 1px);
        background-size: 24px 24px;
      }
      
      /* Dark Mode Base Styles & Pattern */
      .dark body {
        background-color: #09090b;
        color: #fafafa;
        background-image: radial-gradient(#27272a 1px, transparent 1px);
        background-size: 24px 24px;
      }

      /* Custom scrollbar for terminal */
      .terminal-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .terminal-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .terminal-scroll::-webkit-scrollbar-thumb {
        background: #27272a; /* zinc-800 */
        border-radius: 3px;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      
      .animate-in {
        animation: animateIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      @keyframes animateIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* --- Radial View Transition (Dark Mode) --- */
      ::view-transition-old(root),
      ::view-transition-new(root) {
        animation: none;
        mix-blend-mode: normal;
      }

      /* --- Grid Scan Component Styles --- */
      .gridscan {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .gridscan__preview {
        position: absolute;
        right: 12px;
        bottom: 12px;
        width: 220px;
        height: 132px;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.25);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        background: #000;
        color: #fff;
        font:
          12px/1.2 system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        pointer-events: none;
      }

      .gridscan__video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
      }

      .gridscan__badge {
        position: absolute;
        left: 8px;
        top: 8px;
        padding: 2px 6px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 6px;
        backdrop-filter: blur(4px);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "three": "https://esm.sh/three@0.160.0",
    "postprocessing": "https://esm.sh/postprocessing@6.34.1?deps=three@0.160.0",
    "face-api.js": "https://esm.sh/face-api.js@0.22.2"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
